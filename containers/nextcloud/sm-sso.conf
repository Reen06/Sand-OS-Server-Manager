# Server-Manager SSO wiring for Nextcloud.
#
# The SM proxy is the ONLY thing that can reach this container (localhost-bound)
# and it validates the Hub session, then injects a trusted `Remote-User` header
# (stripping any client-supplied one). Map it to a NON-special env var —
# REMOTE_USER is reserved by Apache's auth phase and is NOT populated from
# SetEnvIf (PHP reads it from r->user, which is empty here); and user_saml
# forbids HTTP_-prefixed names. SM_SSO_USER is what user_saml's
# environment-variable backend reads (see the before-starting hook).
SetEnvIfNoCase Remote-User "(.+)" SM_SSO_USER=$1
